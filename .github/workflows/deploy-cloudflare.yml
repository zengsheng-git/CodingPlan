name: Deploy to Cloudflare Pages

# 双轨部署: 这个 workflow 专门把项目部署到 Cloudflare Pages,
# 让 Kimi 走 functions/api/kimi-usages.ts 代理 (生产可用)。
# 另一个 workflow deploy.yml 负责部署到 GitHub Pages (MiniMax/DeepSeek/GLM)。
# 两者互相独立, push 到 main 时并行触发。

on:
  push:
    branches: [main]
  workflow_dispatch:

# 允许 wrangler 写入 Cloudflare
permissions:
  contents: read

# 与 GH Pages 部署独立,各自有自己的并发组,互不阻塞
concurrency:
  group: cloudflare-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      # 关键: CF Pages 根路径部署, base 必须是 '/'
      # (vite.config.ts 默认 '/CodingPlan/' 是给 GH Pages 用的)
      - name: Build
        run: npm run build
        env:
          VITE_BASE: '/'

      # SPA fallback: 与 GH Pages 的 404.html trick 等价
      # (public/_redirects 会被 Vite 复制到 dist/, 由 CF Pages 读取)
      - name: SPA fallback (404.html)
        run: cp dist/index.html dist/404.html

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=codingplan
